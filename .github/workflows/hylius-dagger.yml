name: Hylius Dagger CI

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Dockerfile exists
        run: |
          if [ ! -f "Dockerfile" ]; then
           echo "No Dockerfile found — generating one with Railpack..."
            curl -sSL https://railpack.com/install.sh | bash
            
            # Fetch Build Env variables from Hylius Dashboard
            HYLIUS_BASE_URL=$(echo "\${{ secrets.HYLIUS_WEBHOOK_URL }}" | sed 's|/api/webhooks/deploy-complete||')
            curl -s -H "Authorization: Bearer \${{ secrets.HYLIUS_API_TOKEN }}" "$HYLIUS_BASE_URL/api/webhooks/env?repo=\${{ github.repository }}" > .hylius.env
            
            # Export envs and generate Dockerfile
            export $(grep -v '^#' .hylius.env | xargs)
            railpack generate
            echo "Dockerfile generated successfully"
          fi

      - name: Build & push image via Dagger
        uses: dagger/dagger-for-github@v7
        with:
          verb: call
          args: build-and-push --source=. --registry=ghcr.io --image=ghcr.io/${{ github.repository }} --tag=${{ github.sha }} --webhook-url=${{ secrets.HYLIUS_WEBHOOK_URL }} --webhook-token=${{ secrets.HYLIUS_API_TOKEN }} --repo=${{ github.repository }} --sha=${{ github.sha }} --ref=${{ github.ref }} --github-token=env:GITHUB_TOKEN
          module: .dagger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
